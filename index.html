<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokan Sowar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body {
  font-family: 'Poppins', sans-serif;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(15px);
  z-index:1000;
}

header h1 {
  letter-spacing:3px;
  font-weight:700;
}

nav a {
  margin-left:25px;
  color:white;
  text-decoration:none;
  font-size:14px;
  position:relative;
}

nav a::after {
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:0;
  height:2px;
  background:#fff;
  transition:0.3s;
}

nav a:hover::after {
  width:100%;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
}

.hero h2 {
  font-size:64px;
  max-width:800px;
  line-height:1.2;
}

.hero p {
  margin-top:20px;
  color:#bbb;
  font-size:18px;
}

.btn {
  margin-top:30px;
  padding:14px 35px;
  background:white;
  color:black;
  border-radius:40px;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn:hover {
  background:#ddd;
  transform:translateY(-3px);
}

section {
  padding:120px 60px;
}

/* SECTION TITLE */
.section-title {
  text-align:center;
  margin-bottom:60px;
  font-size:32px;
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card {
  position:relative;
  overflow:hidden;
  border-radius:20px;
}

.card img {
  width:100%;
  height:350px;
  object-fit:cover;
  transition:0.5s;
}

.card:hover img {
  transform:scale(1.1);
}

.card::after {
  content:"View";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:0.3s;
}

.card:hover::after {
  opacity:1;
}

/* CONTACT */
.contact {
  text-align:center;
}

.contact p {
  margin:10px 0;
  color:#ccc;
}

.contact a {
  color:white;
  text-decoration:none;
}

/* MAP */
.map {
  margin-top:40px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* FOOTER */
footer {
  text-align:center;
  padding:25px;
  border-top:1px solid #222;
  color:#777;
}

/* ARABIC TEXT */
.arabic {
  margin-top:25px;
  color:#aaa;
  font-size:17px;
  line-height:1.9;
}

/* MOBILE */
@media(max-width:768px){
  header {
    padding:15px 20px;
  }

  .hero h2 {
    font-size:36px;
  }

  section {
    padding:80px 20px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Dokan Sowar</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Capture Moments. Create Timeless Memories.</h2>
  <p>Modern Photography Studio in Jordan</p>
  <a href="#contact" class="btn">Book Now</a>
</section>

<!-- WORK -->
<section id="work">
  <h2 class="section-title">Our Work</h2>

  <div class="gallery">
    <div class="card"><img src="https://source.unsplash.com/600x600/?portrait"></div>
    <div class="card"><img src="https://source.unsplash.com/600x600/?wedding"></div>
    <div class="card"><img src="https://source.unsplash.com/600x600/?fashion"></div>
    <div class="card"><img src="https://source.unsplash.com/600x600/?studio"></div>
    <div class="card"><img src="https://source.unsplash.com/600x600/?photography"></div>
    <div class="card"><img src="https://source.unsplash.com/600x600/?model"></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">

  <h2 class="section-title">Contact Us</h2>

  <p>📧 <a href="mailto:dokansowar@gmail.com">dokansowar@gmail.com</a></p>
  <p>📞 <a href="tel:0799015930">0799015930</a></p>
  <p>📍 Al-Karak / Mu’tah, Jordan</p>

  <div class="arabic">
    من دكّاننا الى ذكرياتكم 📷🎞️<br>
  </div>

  <div class="map">
    <iframe
      src="https://www.google.com/maps?q=31.102123494560754,35.70665328892669&z=16&output=embed"
      width="100%"
      height="350"
      style="border:0;"
      loading="lazy">
    </iframe>
  </div>

  <a href="https://www.instagram.com/dokansowar/" class="btn">Instagram</a>

</section>

<footer>
  © 2026 Dokan Sowar Studio
</footer>

</body>
</html>
